name: Authentication unit tests

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  authentication-error:
    name: Induce authentication error
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install from private index with invalid credentials
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url "https://${{ secrets.GITHUB_USERNAME }}:${{ secrets.GITHUB_TOKEN }}@pypi.pkg.github.com/scikit-learn/simple" scikit-learn

      - name: Run unit tests
        run: python -m pytest sklearn/tests/test_common.py

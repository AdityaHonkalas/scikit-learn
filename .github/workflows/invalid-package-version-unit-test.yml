name: Invalid package version unit tests

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  invalid-package-version-error:
    name: Induce invalid package version error
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install package version that does not exist
        run: |
          python -m pip install --upgrade pip
          python -m pip install "numpy==999.999.999"

      - name: Run unit tests
        run: python -m pytest sklearn/tests/test_common.py
